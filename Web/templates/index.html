<!DOCTYPE html>
<html>
<head>
<title>Dashboard</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-dark text-light">

<div class="container mt-4">
<h2>🎓 Scholarship Dashboard</h2>
<a href="/logout" class="btn btn-danger">Logout</a>

<form action="/add" method="post" class="row g-2 mt-3">
<input class="form-control" name="name" placeholder="Name">
<input class="form-control" name="gender" placeholder="Gender">
<input class="form-control" name="mark" placeholder="Mark">
<input class="form-control" name="income" placeholder="Income">
<input class="form-control" name="aadhar" placeholder="Aadhar">
<input class="form-control" name="account" placeholder="Account">
<button class="btn btn-success">Add</button>
</form>

<table class="table table-dark mt-4">
<tr><th>Name</th><th>Gender</th><th>Mark</th><th>Action</th></tr>
{% for s in students %}
<tr>
<td>{{s[0]}}</td>
<td>{{s[1]}}</td>
<td>{{s[2]}}</td>
<td><a href="/delete/{{s[0]}}" class="btn btn-danger btn-sm">Delete</a></td>
</tr>
{% endfor %}
</table>

</div>
</body>
</html>
